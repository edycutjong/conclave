<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512"
     role="img" aria-labelledby="t d" onclick="togglePause()" style="cursor:pointer">
  <title id="t">Conclave</title>
  <desc id="d">Agent council — three role-coloured agents debate in round-robin, their argument lines flashing and converging into a central consensus seal that stamps an approval check, all within a slowly rotating council ring. Click to pause.</desc>
  <script><![CDATA[
    var paused=false;
    function togglePause(){var s=document.querySelector('svg');if(paused){s.unpauseAnimations();paused=false;}else{s.pauseAnimations();paused=true;}}
  ]]></script>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#221403"/>
      <stop offset="60%" stop-color="#0f0904"/>
      <stop offset="100%" stop-color="#020617"/>
      <animate attributeName="cx" values="50%;56%;44%;50%" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="42%;48%;36%;42%" dur="10s" repeatCount="indefinite"/>
    </radialGradient>
    <linearGradient id="brandLive" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B">
        <animate attributeName="stop-color" values="#F59E0B;#fbbf24;#06B6D4;#F59E0B" dur="7s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#06B6D4">
        <animate attributeName="stop-color" values="#06B6D4;#F59E0B;#22d3ee;#06B6D4" dur="7s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <radialGradient id="seal" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </radialGradient>
    <filter id="neon" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b1"/>
      <feGaussianBlur stdDeviation="18" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#grid)" opacity="0.85"/>

  <!-- Sweeping cyber scanline -->
  <line x1="0" y1="-10" x2="512" y2="-10" stroke="#06B6D4" stroke-width="1.8" opacity="0.12" filter="url(#neon)">
    <animate attributeName="y1" values="-10;522;-10" dur="6s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
    <animate attributeName="y2" values="-10;522;-10" dur="6s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
  </line>

  <!-- Ambient glow -->
  <ellipse cx="256" cy="256" rx="150" ry="150" fill="#F59E0B" filter="url(#soft)" opacity="0.16">
    <animate attributeName="opacity" values="0.09;0.22;0.09" dur="4s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Translating group containing the whole interactive diagram -->
  <g transform="translate(256, 256)">

    <!-- Rotating council ring with ticks -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s" repeatCount="indefinite"/>
      <circle cx="0" cy="0" r="186" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.3" stroke-dasharray="4 18"/>
      <circle cx="0" cy="0" r="170" fill="none" stroke="#06B6D4" stroke-width="1.5" opacity="0.18"/>
    </g>

    <!-- Consensus stamp shockwave (triggers right after streams converge) -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="#22C55E" stroke-width="3" opacity="0" filter="url(#neon)">
      <animate attributeName="r" values="40;40;180;180" keyTimes="0;0.42;0.65;1" dur="3.6s" repeatCount="indefinite"
        calcMode="spline" keySplines="0 0 0.2 1; 0.1 0.8 0.3 1; 0.1 0.8 0.3 1"/>
      <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.40;0.42;0.65;1" dur="3.6s" repeatCount="indefinite"/>
    </circle>

    <!-- Debate triangle edges (flash in sequence) -->
    <g stroke-width="3" fill="none" stroke-linecap="round">
      <line x1="0" y1="-150" x2="-130" y2="75" stroke="#06B6D4"><animate attributeName="opacity" values="0.15;0.95;0.15;0.15" keyTimes="0;0.16;0.33;1" dur="3.6s" repeatCount="indefinite"/></line>
      <line x1="-130" y1="75" x2="130" y2="75" stroke="#22C55E"><animate attributeName="opacity" values="0.15;0.15;0.95;0.15;0.15" keyTimes="0;0.33;0.5;0.66;1" dur="3.6s" repeatCount="indefinite"/></line>
      <line x1="130" y1="75" x2="0" y2="-150" stroke="#F59E0B"><animate attributeName="opacity" values="0.15;0.15;0.95;0.15" keyTimes="0;0.66;0.83;1" dur="3.6s" repeatCount="indefinite"/></line>
    </g>

    <!-- Convergence streams agent -> seal -->
    <g stroke-width="5" stroke-linecap="round" stroke-dasharray="9 120">
      <line x1="0" y1="-122" x2="0" y2="-46" stroke="#06B6D4"><animate attributeName="stroke-dashoffset" values="129;0" dur="1.2s" begin="0s" repeatCount="indefinite"/></line>
      <line x1="-106" y1="62" x2="-36" y2="26" stroke="#22C55E"><animate attributeName="stroke-dashoffset" values="129;0" dur="1.2s" begin="0.4s" repeatCount="indefinite"/></line>
      <line x1="106" y1="62" x2="36" y2="26" stroke="#F59E0B"><animate attributeName="stroke-dashoffset" values="129;0" dur="1.2s" begin="0.8s" repeatCount="indefinite"/></line>
    </g>

    <!-- Coordinated agent debate pulse rings (sonar effect) -->
    <!-- Researcher Pulse -->
    <circle cx="0" cy="-150" r="30" fill="none" stroke="#06B6D4" stroke-width="2.5" opacity="0">
      <animate attributeName="r" values="30;85;85" keyTimes="0;0.33;1" dur="3.6s" repeatCount="indefinite" calcMode="spline" keySplines="0.1 0.8 0.3 1; 0.1 0.8 0.3 1"/>
      <animate attributeName="opacity" values="0.8;0;0" keyTimes="0;0.33;1" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <!-- Synthesizer Pulse -->
    <circle cx="-130" cy="75" r="30" fill="none" stroke="#22C55E" stroke-width="2.5" opacity="0">
      <animate attributeName="r" values="30;30;85;85" keyTimes="0;0.33;0.66;1" dur="3.6s" repeatCount="indefinite" calcMode="spline" keySplines="0.1 0.8 0.3 1; 0.1 0.8 0.3 1; 0.1 0.8 0.3 1"/>
      <animate attributeName="opacity" values="0;0.8;0;0" keyTimes="0;0.33;0.66;1" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <!-- Skeptic Pulse -->
    <circle cx="130" cy="75" r="30" fill="none" stroke="#F59E0B" stroke-width="2.5" opacity="0">
      <animate attributeName="r" values="30;30;30;85" keyTimes="0;0.66;0.99;1" dur="3.6s" repeatCount="indefinite" calcMode="spline" keySplines="0.1 0.8 0.3 1; 0.1 0.8 0.3 1; 0.1 0.8 0.3 1"/>
      <animate attributeName="opacity" values="0;0;0.8;0" keyTimes="0;0.66;0.99;1" dur="3.6s" repeatCount="indefinite"/>
    </circle>

    <!-- Three agent orbs (round-robin debate pulse) -->
    <g filter="url(#neon)">
      <!-- Researcher -->
      <g>
        <animate attributeName="opacity" values="0.55;1;0.55;0.55" keyTimes="0;0.16;0.33;1" dur="3.6s" repeatCount="indefinite"/>
        <circle cx="0" cy="-150" r="30" fill="#04121c" stroke="#06B6D4" stroke-width="6"/>
        <circle cx="0" cy="-150" r="11" fill="#06B6D4"/>
      </g>
      <!-- Synthesizer -->
      <g>
        <animate attributeName="opacity" values="0.55;0.55;1;0.55;0.55" keyTimes="0;0.33;0.5;0.66;1" dur="3.6s" repeatCount="indefinite"/>
        <circle cx="-130" cy="75" r="30" fill="#04140d" stroke="#22C55E" stroke-width="6"/>
        <circle cx="-130" cy="75" r="11" fill="#22C55E"/>
      </g>
      <!-- Skeptic -->
      <g>
        <animate attributeName="opacity" values="0.55;0.55;0.55;1;0.55" keyTimes="0;0.5;0.66;0.83;1" dur="3.6s" repeatCount="indefinite"/>
        <circle cx="130" cy="75" r="30" fill="#1c1304" stroke="#F59E0B" stroke-width="6"/>
        <circle cx="130" cy="75" r="11" fill="#F59E0B"/>
      </g>
    </g>

    <!-- Central consensus seal -->
    <g filter="url(#neon)">
      <!-- Seal rotation -->
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="22s" repeatCount="indefinite"/>
        <polygon points="0,-50 43,-25 43,25 0,50 -43,25 -43,-25" fill="none" stroke="url(#brandLive)" stroke-width="4" opacity="0.6"/>
      </g>
      <!-- Seal pulsation -->
      <g>
        <animateTransform attributeName="transform" type="scale" values="1;1.12;1" dur="1.8s" repeatCount="indefinite"
          calcMode="spline" keyTimes="0;0.5;1" keySplines="0.34 1.56 0.64 1;0.4 0 0.6 1"/>
        <circle cx="0" cy="0" r="40" fill="url(#seal)"/>
      </g>
    </g>

    <!-- Approval check, stamped once the council converges each cycle -->
    <!-- Stamped check spring overshoot scale -->
    <g>
      <animateTransform attributeName="transform" type="scale" values="0;0;1.38;0.96;1;1;0" keyTimes="0;0.35;0.44;0.49;0.54;0.85;0.92" dur="3.6s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.2 1; 0.34 1.56 0.64 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"/>
      
      <!-- Base dark contrast line -->
      <polyline points="-19,1 -5,16 21,-16" fill="none" stroke="#020617" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="0 70">
        <animate attributeName="stroke-dasharray" values="0 70;0 70;70 70;70 70;70 70" keyTimes="0;0.36;0.45;0.85;1" dur="3.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.35;0.42;0.85;0.92;1" dur="3.6s" repeatCount="indefinite"/>
      </polyline>
      
      <!-- Glowing neon cyan tick -->
      <polyline points="-19,1 -5,16 21,-16" fill="none" stroke="#00F0FF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="0 70" filter="url(#neon)">
        <animate attributeName="stroke-dasharray" values="0 70;0 70;70 70;70 70;70 70" keyTimes="0;0.36;0.45;0.85;1" dur="3.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.35;0.42;0.85;0.92;1" dur="3.6s" repeatCount="indefinite"/>
      </polyline>
    </g>

  </g>
</svg>
